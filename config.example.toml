# kivi-agent Wave 4 配置示例（agent: package-config-v4）
# 复制为 config.toml 或用 KIVI_* 环境变量覆盖（环境变量优先级最高）
# 完整覆盖路径由 ConfigRuntime.load(config_path=...) 指定
#
# 注意：TOML 中一旦进入 [section]，后续 key-value 都属于该 section 直到新 section header。
# 故 `auto_fallback` 放在文件开头（所有 section 之前），才能成为顶层 key。

# 真实服务不可用时是否自动降级到 Mock（true / false）
auto_fallback = true

[rag]
# RAG Adapter 模式：
#   mock    — 演示版（默认；无需真实服务）
#   http    — 真实 rag-kb HTTP API
mode = "mock"
# 真实 rag-kb API 地址（仅 mode=http 时生效）
api_url = "http://localhost:8001"
# HTTP 调用超时（秒；正数）
timeout_s = 5.0

[db]
# DB Adapter 模式：
#   mock     — 演示版（默认；内存数据）
#   sqlite   — 真实 SQLite（本地文件）
#   postgres — 真实 Postgres（需 asyncpg）
mode = "mock"
# 数据库连接 URL：
#   sqlite:    "sqlite:///~/.kivi/kivi.db"
#   postgres:  "postgresql://user:pass@localhost:5432/kivi"
database_url = "sqlite:///~/.kivi/kivi.db"

[health]
# 健康检查间隔（秒；正数）
interval_s = 60.0
# 单次健康检查超时（秒；正数）
timeout_s = 3.0

# Eval 价格表（agent: package-eval-metrics-v51）
# 格式：model_name = [input_per_1k_usd, output_per_1k_usd]
[pricing]
"claude-sonnet-4-6" = [0.003, 0.015]
"claude-haiku-4-5" = [0.0008, 0.004]
"gpt-4o" = [0.005, 0.015]

# 长期记忆后端（agent: package-vector-memory-v61）
# 真实服务不可用时是否自动 fallback 到 Local（true / false）
memory_auto_fallback = true

[memory]
# 后端选择：
#   local   — 本地 Markdown 文件（默认；不依赖外部服务）
#   vector  — Elasticsearch 向量检索（需 [es] 段配置）
backend = "local"

[embedding]
# Embedding 实现：
#   fake    — 离线 SHA-512 伪随机（默认；演示/单测）
#   openai  — OpenAI 兼容 /v1/embeddings
provider = "fake"
# 向量维度（与 ES 索引 mapping 强一致；text-embedding-3-small 支持 256/512/1024/1536/3072）
dims = 384
# Embedding 模型名（仅 provider=openai 时生效）
model = "text-embedding-3-small"

[openai]
# OpenAI 兼容 Embedding API 地址（也可用 ANTHROPIC_BASE_URL 共用代理）
# base_url = "https://api.openai.com"
# OpenAI 兼容 API key（也可用 ANTHROPIC_API_KEY 复用）
# api_key = "sk-..."

[es]
# Elasticsearch 8.x 服务地址
url = "http://localhost:9200"
# ES API Key（开发模式可留空；生产建议配）
# api_key = ""
# 向量索引名（VectorMemoryBackend 写入位置）
index = "kivi-memories"
# 审计事件独立索引
audit_index = "kivi-memory-audit"
# ES 请求超时（秒）
timeout_s = 5.0
